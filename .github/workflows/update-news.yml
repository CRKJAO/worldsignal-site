name: Update global news

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: news-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Collect and rank global signals
        run: npm run update
      - name: Validate generated dataset
        run: npm run check
      - name: Commit fresh signals
        run: |
          git config user.name "worldsignal-bot"
          git config user.email "worldsignal-bot@users.noreply.github.com"
          git add data/news.json
          git diff --cached --quiet || git commit -m "data: refresh global signals"
          git push
